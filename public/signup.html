<!DOCTYPE html>
<html lang="en">

<head>
  <title>Document</title>
  <style>
    * {
      margin: 0;
    }

    main {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    main>div {
      width: 30%;
    }

    form {
      padding: 1.5em;
      border: 1px solid gray;
      border-radius: 5px;
    }

    h4 {
      margin: 1em 0;
    }

    input {
      height: 30px;
      border-radius: 5px;
      padding: 1em;
      border: 1px solid grey;
      outline-color: darkslategrey;
    }


    .show {
      margin-top: 1em;
      display: flex;
      gap: 2%;
      align-items: center;
    }

    .show input {
      height: 20px;
    }

    .button {
      padding: 10px;
      margin: 2em 0.3em 0 0.3em;
      border-radius: 20px;
      cursor: pointer;
    }

    .submit {
      color: aliceblue;
      background: darkcyan;
    }

    .submit:hover {
      background: rgba(0, 139, 139, 0.737);
    }
  </style>
</head>

<body>
  <main>
    <div></div>
    <div>
      <form action="/extra" method="post">
      </form>
    </div>
  </main>
</body>

</html>
