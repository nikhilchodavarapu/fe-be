<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    main {
      width: 22vw;
      height: 80vh;
      border: 1px solid;
      border-radius: 15px;
    }

    .home {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .home header {
      border-bottom: 1px solid;
      height: 4em;
      display: grid;
      grid-template-columns: 1fr 5fr 1fr;
      column-gap: 5%;
      align-content: center;
      justify-items: center;
    }

    .home footer {
      border-top: 1px solid;
      height: 3em;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
    }

    .logo {
      width: 80px;
    }
  </style>
</head>

<body>
  <main>
    <div class="home">
      <header>
        <img src="assets/add.svg" alt="add">
        <img src="assets/Instagram_logo.svg" alt="logo" class="logo">
        <img src="assets/like.svg" alt="like">
      </header>

      <footer>
        <img src="assets/home.svg" alt="home">
        <img src="assets/reels.svg" alt="reels">
        <img src="assets/chats.svg" alt="chats">
        <img src="assets/search.svg" alt="search">
        <img src="assets/profile.svg" alt="profile">
      </footer>
    </div>
  </main>
</body>

</html>
